      description: Handles an MCP JSON-RPC message over SSE transport. Extracts the session context from the request, processes
        the JSON-RPC request through the protocol service, and sends the response via the associated SSE emitter.
      operationId: handleSseMessage
      security:
      - bearerAuth: []
      - mcpTokenAuth: []
      parameters:
