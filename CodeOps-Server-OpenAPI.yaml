openapi: 3.0.3
info:
  title: CodeOps Server API
  version: '1.44'
  description: >-
    Cloud backend for CodeOps, an AI-powered software maintenance platform.
    Includes Core, Courier, Logger, and Registry modules.
  contact:
    name: CodeOps Team

servers:
  - url: http://localhost:8090
    description: Local development server

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Authentication and MFA endpoints
  - name: Admin
    description: Administrative operations (ADMIN/OWNER role required)
  - name: Users
    description: User profile management
  - name: Teams
    description: Team management and invitations
  - name: Projects
    description: Project management
  - name: Tasks
    description: Remediation task management
  - name: Jobs
    description: QA job management and agent runs
  - name: Findings
    description: Finding management
  - name: Personas
    description: AI persona management
  - name: Directives
    description: Directive management and project assignments
  - name: TechDebt
    description: Technical debt tracking
  - name: Compliance
    description: Compliance specifications and items
  - name: Dependencies
    description: Dependency scans and vulnerabilities
  - name: HealthMonitor
    description: Health schedules and snapshots
  - name: Metrics
    description: Project and team metrics
  - name: Integrations
    description: GitHub and Jira connections
  - name: Reports
    description: Report upload and download
  - name: Health
    description: Health check endpoints
  - name: Courier-Collections
    description: Courier collection management
  - name: Courier-Requests
    description: Courier HTTP request management
  - name: Courier-Folders
    description: Courier folder management
  - name: Courier-Environments
    description: Courier environment management
  - name: Courier-Variables
    description: Courier global variable management
  - name: Courier-Sharing
    description: Courier collection sharing
  - name: Courier-History
    description: Courier request history
  - name: Courier-Import
    description: Courier collection import
  - name: Courier-Proxy
    description: Courier HTTP proxy
  - name: Courier-GraphQL
    description: Courier GraphQL operations
  - name: Courier-CodeGen
    description: Courier code generation
  - name: Courier-Runner
    description: Courier collection runner
  - name: Courier-Health
    description: Courier health check
  - name: Logger-Ingestion
    description: Logger log ingestion
  - name: Logger-Sources
    description: Logger log source management
  - name: Logger-Query
    description: Logger log querying and search
  - name: Logger-Alerts
    description: Logger alert channels, rules, and history
  - name: Logger-Traps
    description: Logger log trap management
  - name: Logger-Dashboards
    description: Logger dashboard and widget management
  - name: Logger-Metrics
    description: Logger metrics management
  - name: Logger-Traces
    description: Logger distributed tracing
  - name: Logger-Anomalies
    description: Logger anomaly detection
  - name: Logger-Retention
    description: Logger data retention policies
  - name: Registry-Services
    description: Registry service registration
  - name: Registry-Solutions
    description: Registry solution management
  - name: Registry-Ports
    description: Registry port allocation
  - name: Registry-Dependencies
    description: Registry service dependency graph
  - name: Registry-Routes
    description: Registry API route management
  - name: Registry-Config
    description: Registry config generation
  - name: Registry-Infra
    description: Registry infrastructure resources
  - name: Registry-Topology
    description: Registry service topology
  - name: Registry-Health
    description: Registry health management
  - name: Registry-Workstations
    description: Registry workstation profiles

paths:
  # ============================================================
  # CORE MODULE - Auth Controller (14 endpoints)
  # ============================================================
  /api/v1/auth/register:
    post:
      tags: [Auth]
      operationId: register
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      operationId: login
      summary: Authenticate user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshToken
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      summary: Logout and invalidate token
      responses:
        '204':
          description: Logged out

  /api/v1/auth/change-password:
    post:
      tags: [Auth]
      operationId: changePassword
      summary: Change current user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed

  /api/v1/auth/mfa/setup:
    post:
      tags: [Auth]
      operationId: mfaSetup
      summary: Initiate TOTP MFA setup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaSetupRequest'
      responses:
        '200':
          description: MFA setup initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaSetupResponse'

  /api/v1/auth/mfa/verify:
    post:
      tags: [Auth]
      operationId: mfaVerify
      summary: Verify MFA code and enable MFA
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaVerifyRequest'
      responses:
        '200':
          description: MFA verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaStatusResponse'

  /api/v1/auth/mfa/login:
    post:
      tags: [Auth]
      operationId: mfaLogin
      summary: Complete MFA login challenge
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaLoginRequest'
      responses:
        '200':
          description: MFA login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /api/v1/auth/mfa/disable:
    post:
      tags: [Auth]
      operationId: mfaDisable
      summary: Disable MFA for current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaSetupRequest'
      responses:
        '200':
          description: MFA disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaStatusResponse'

  /api/v1/auth/mfa/recovery-codes:
    post:
      tags: [Auth]
      operationId: mfaRegenerateRecoveryCodes
      summary: Regenerate MFA recovery codes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaSetupRequest'
      responses:
        '200':
          description: Recovery codes regenerated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaRecoveryResponse'

  /api/v1/auth/mfa/status:
    get:
      tags: [Auth]
      operationId: mfaStatus
      summary: Get current user MFA status
      responses:
        '200':
          description: MFA status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaStatusResponse'

  /api/v1/auth/mfa/setup/email:
    post:
      tags: [Auth]
      operationId: mfaSetupEmail
      summary: Initiate email-based MFA setup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaEmailSetupRequest'
      responses:
        '200':
          description: Email MFA setup initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaRecoveryResponse'

  /api/v1/auth/mfa/verify-setup/email:
    post:
      tags: [Auth]
      operationId: mfaVerifySetupEmail
      summary: Verify email MFA setup code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaVerifyRequest'
      responses:
        '200':
          description: Email MFA enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaStatusResponse'

  /api/v1/auth/mfa/resend:
    post:
      tags: [Auth]
      operationId: mfaResend
      summary: Resend MFA code via email
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaResendRequest'
      responses:
        '200':
          description: MFA code resent
  # ============================================================
  # CORE MODULE - Admin Controller (10 endpoints)
  # ============================================================
  /api/v1/admin/users:
    get:
      tags: [Admin]
      operationId: adminGetAllUsers
      summary: Get all users (paginated)
      parameters:
        - name: page
          in: query
          schema: {type: integer, default: 0}
        - name: size
          in: query
          schema: {type: integer, default: 20}
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpringPageUserResponse'

  /api/v1/admin/users/{userId}:
    get:
      tags: [Admin]
      operationId: adminGetUserById
      summary: Get user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    put:
      tags: [Admin]
      operationId: adminUpdateUserStatus
      summary: Update user status or properties
      parameters:
        - name: userId
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/v1/admin/settings:
    get:
      tags: [Admin]
      operationId: adminGetAllSettings
      summary: Get all system settings
      responses:
        '200':
          description: System settings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SystemSettingResponse'
    put:
      tags: [Admin]
      operationId: adminUpdateSystemSetting
      summary: Update a system setting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSystemSettingRequest'
      responses:
        '200':
          description: Setting updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSettingResponse'

  /api/v1/admin/settings/{key}:
    get:
      tags: [Admin]
      operationId: adminGetSystemSetting
      summary: Get system setting by key
      parameters:
        - name: key
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: System setting
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSettingResponse'

  /api/v1/admin/usage:
    get:
      tags: [Admin]
      operationId: adminGetUsageStats
      summary: Get platform usage statistics
      responses:
        '200':
          description: Usage stats
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /api/v1/admin/audit-log/team/{teamId}:
    get:
      tags: [Admin]
      operationId: adminGetTeamAuditLog
      summary: Get audit log for a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema: {type: string, format: uuid}
        - name: page
          in: query
          schema: {type: integer, default: 0}
        - name: size
          in: query
          schema: {type: integer, default: 20}
      responses:
        '200':
          description: Team audit log
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpringPageAuditLogResponse'

  /api/v1/admin/audit-log/user/{userId}:
    get:
      tags: [Admin]
      operationId: adminGetUserAuditLog
      summary: Get audit log for a user
      parameters:
        - name: userId
          in: path
          required: true
          schema: {type: string, format: uuid}
        - name: page
          in: query
          schema: {type: integer, default: 0}
        - name: size
          in: query
          schema: {type: integer, default: 20}
      responses:
        '200':
          description: User audit log
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpringPageAuditLogResponse'

  /api/v1/admin/users/{userId}/reset-mfa:
    post:
      tags: [Admin]
      operationId: adminResetUserMfa
      summary: Force-reset MFA for a user
      parameters:
        - name: userId
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: MFA reset
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: {type: string}
                  userId: {type: string, format: uuid}

  # ============================================================
  # CORE MODULE - User Controller (6 endpoints)
  # ============================================================
  /api/v1/users/me:
    get:
      tags: [Users]
      operationId: getCurrentUser
      summary: Get current authenticated user
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/v1/users/{id}:
    get:
      tags: [Users]
      operationId: getUserById
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
    put:
      tags: [Users]
      operationId: updateUser
      summary: Update user profile
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'

  /api/v1/users/search:
    get:
      tags: [Users]
      operationId: searchUsers
      summary: Search users by display name
      parameters:
        - name: q
          in: query
          required: true
          schema: {type: string, minLength: 2, maxLength: 100}
      responses:
        '200':
          description: Matching users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'

  /api/v1/users/{id}/deactivate:
    put:
      tags: [Users]
      operationId: deactivateUser
      summary: Deactivate a user (ADMIN/OWNER)
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '204':
          description: User deactivated

  /api/v1/users/{id}/activate:
    put:
      tags: [Users]
      operationId: activateUser
      summary: Activate a user (ADMIN/OWNER)
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '204':
          description: User activated

  # ============================================================
  # CORE MODULE - Team Controller (12 endpoints)
  # ============================================================
  /api/v1/teams:
    post:
      tags: [Teams]
      operationId: createTeam
      summary: Create a new team
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeamRequest'
      responses:
        '201':
          description: Team created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponse'
    get:
      tags: [Teams]
      operationId: getTeams
      summary: Get teams for current user
      responses:
        '200':
          description: Team list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TeamResponse'

  /api/v1/teams/{teamId}:
    get:
      tags: [Teams]
      operationId: getTeam
      summary: Get team by ID
      parameters:
        - name: teamId
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: Team details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponse'
    put:
      tags: [Teams]
      operationId: updateTeam
      summary: Update team
      parameters:
        - name: teamId
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTeamRequest'
      responses:
        '200':
          description: Team updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponse'
    delete:
      tags: [Teams]
      operationId: deleteTeam
      summary: Delete team
      parameters:
        - name: teamId
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '204':
          description: Team deleted

  /api/v1/teams/{teamId}/members:
    get:
      tags: [Teams]
      operationId: getTeamMembers
      summary: Get team members
      parameters:
        - name: teamId
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: Team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TeamMemberResponse'

  /api/v1/teams/{teamId}/members/{userId}/role:
    put:
      tags: [Teams]
      operationId: updateMemberRole
      summary: Update team member role
      parameters:
        - name: teamId
          in: path
          required: true
          schema: {type: string, format: uuid}
        - name: userId
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMemberRoleRequest'
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMemberResponse'

  /api/v1/teams/{teamId}/members/{userId}:
    delete:
      tags: [Teams]
      operationId: removeMember
      summary: Remove team member
      parameters:
        - name: teamId
          in: path
          required: true
          schema: {type: string, format: uuid}
        - name: userId
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '204':
          description: Member removed

  /api/v1/teams/{teamId}/invitations:
    post:
      tags: [Teams]
      operationId: inviteMember
      summary: Invite a member to the team
      parameters:
        - name: teamId
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteMemberRequest'
      responses:
        '201':
          description: Invitation sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationResponse'
    get:
      tags: [Teams]
      operationId: getTeamInvitations
      summary: Get pending invitations for team
      parameters:
        - name: teamId
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: Invitation list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InvitationResponse'

  /api/v1/teams/{teamId}/invitations/{invitationId}:
    delete:
      tags: [Teams]
      operationId: cancelInvitation
      summary: Cancel an invitation
      parameters:
        - name: teamId
          in: path
          required: true
          schema: {type: string, format: uuid}
        - name: invitationId
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '204':
          description: Invitation cancelled

  /api/v1/teams/invitations/{token}/accept:
    post:
      tags: [Teams]
      operationId: acceptInvitation
      summary: Accept a team invitation
      parameters:
        - name: token
          in: path
          required: true
          schema: {type: string}
      responses:
        '200':
          description: Invitation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponse'

  # ============================================================
  # CORE MODULE - Project Controller (7 endpoints)
  # ============================================================
  /api/v1/projects/{teamId}:
    post:
      tags: [Projects]
      operationId: createProject
      summary: Create a new project
      parameters:
        - name: teamId
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'

  /api/v1/projects/team/{teamId}:
    get:
      tags: [Projects]
      operationId: getProjectsByTeam
      summary: Get projects for a team (paginated)
      parameters:
        - name: teamId
          in: path
          required: true
          schema: {type: string, format: uuid}
        - name: includeArchived
          in: query
          schema: {type: boolean, default: false}
        - name: page
          in: query
          schema: {type: integer, default: 0}
        - name: size
          in: query
          schema: {type: integer, default: 20}
      responses:
        '200':
          description: Paginated project list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponseProjectResponse'

  /api/v1/projects/{projectId}:
    get:
      tags: [Projects]
      operationId: getProject
      summary: Get project by ID
      parameters:
        - name: projectId
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
    put:
      tags: [Projects]
      operationId: updateProject
      summary: Update project
      parameters:
        - name: projectId
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
    delete:
      tags: [Projects]
      operationId: deleteProject
      summary: Delete project
      parameters:
        - name: projectId
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '204':
          description: Project deleted

  /api/v1/projects/{projectId}/archive:
    put:
      tags: [Projects]
      operationId: archiveProject
      summary: Archive a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        '200':
          description: Project archived

  /api/v1/projects/{projectId}/unarchive:
    put:
      tags: [Projects]
      operationId: unarchiveProject
      summary: Unarchive a project
      parameters:
        - name: projectId
