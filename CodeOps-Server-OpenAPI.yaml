        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTechDebtStatusRequest'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TechDebtItemResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/users/me:
    get:
      tags:
      - Users
      summary: Get current user profile
      operationId: getCurrentUser
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/users/search:
    get:
      tags:
      - Users
      summary: Search users
      operationId: searchUsers
      security:
      - bearerAuth: []
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
          minLength: 2
          maxLength: 100
      responses:
        '200':
          description: Matching users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/users/{id}:
    get:
      tags:
      - Users
      summary: Get user by ID
      operationId: getUserById
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
      - Users
      summary: Update user profile
      operationId: updateUser
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/users/{id}/activate:
    put:
      tags:
      - Users
      summary: Activate a user
      operationId: activateUser
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: User activated
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - requires ADMIN or OWNER role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/users/{id}/deactivate:
    put:
      tags:
      - Users
      summary: Deactivate a user
      operationId: deactivateUser
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: User deactivated
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - requires ADMIN or OWNER role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /api/v1/auth/login
  schemas:
    ActivityFeedEntryResponse:
      type: object
      description: Response DTO for an MCP activity feed entry
      properties:
        id:
          type: string
          format: uuid
          description: Entry ID
        activityType:
          $ref: '#/components/schemas/ActivityType'
        title:
          type: string
          description: Human-readable title
        detail:
          type: string
          nullable: true
          description: Full detail or summary
        sourceModule:
          type: string
          nullable: true
          description: Originating CodeOps module
        sourceEntityId:
          type: string
          format: uuid
          nullable: true
          description: ID of the source entity
        projectName:
          type: string
          nullable: true
          description: Denormalized project name
        impactedServiceIdsJson:
          type: string
          nullable: true
          description: JSON array of impacted service UUIDs
        relayMessageId:
          type: string
          format: uuid
          nullable: true
          description: Relay message ID if posted to channel
        actorName:
          type: string
          nullable: true
          description: Display name of the actor
        projectId:
          type: string
          format: uuid
          nullable: true
          description: Associated project ID
        sessionId:
          type: string
          format: uuid
          nullable: true
          description: Associated session ID
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
    ActivityType:
