      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: User deactivated
        '401':
          description: Not authenticated
        '403':
          description: Insufficient permissions (ADMIN or OWNER required)
        '404':
          description: User not found

  /api/v1/users/{id}/activate:
