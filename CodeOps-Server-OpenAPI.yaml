info:
  title: CodeOps-Server API
  version: 1.0.0
  description: 'Complete OpenAPI specification for CodeOps-Server.

    Generated by Claude Code from source file analysis.


    **Generation timestamp:** 2026-02-28T20:00:00Z

    **Source commit:** bffd3f2b6607c391b76788ceeee5b8a5fdd02aae


    ## Modules

    - **Core** -- Auth, Users, Teams, Projects, Jobs, Findings, Tasks, Personas, Directives, Compliance, Tech Debt, Dependencies,
    Health Monitor, Integrations, Metrics, Reports, Admin

    - **Courier** -- HTTP client/API testing (Collections, Requests, Environments, Folders, GraphQL, History, Import, Proxy,
    Runner, Share, Variables, Code Generation)

    - **Fleet** -- Docker container management (Containers, Service Profiles, Solution Profiles, Workstation Profiles, Images,
    Volumes, Networks)

    - **Logger** -- Log aggregation and monitoring (Log Sources, Log Ingestion, Log Query, Dashboards, Alerts, Anomaly Detection,
    Metrics, Log Traps, Traces, Retention)

    - **MCP** -- Model Context Protocol (Developer Profiles, Sessions, Documents, Activity, Protocol)

    - **Registry** -- Service registry and infrastructure (Services, Dependencies, Ports, Routes, Solutions, Topology, Workstations,
    Infrastructure, Config, Health Management)

    - **Relay** -- Team messaging (Channels, Messages, Direct Messages, Reactions, Presence, Files, Platform Events)'
