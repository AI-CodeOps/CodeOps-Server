components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token (24h expiry)

  schemas:
    # ============================================================
    # ERROR RESPONSE
    # ============================================================
    ErrorResponse:
      type: object
      properties:
        status: {type: integer}
        message: {type: string}

    # ============================================================
    # CORE MODULE - Auth DTOs
    # ============================================================
    RegisterRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email: {type: string, format: email, maxLength: 255}
        password: {type: string, minLength: 4, maxLength: 100}
        displayName: {type: string, maxLength: 100}
        avatarUrl: {type: string, maxLength: 500}

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: {type: string, format: email}
        password: {type: string}

    AuthResponse:
      type: object
      properties:
        accessToken: {type: string}
        refreshToken: {type: string}
        tokenType: {type: string}
        expiresIn: {type: integer, format: int64}
        user:
          \: "#/components/schemas/UserResponse"

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: {type: string}

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword: {type: string}
        newPassword: {type: string, minLength: 4, maxLength: 100}

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email: {type: string, format: email}

    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token: {type: string}
        newPassword: {type: string, minLength: 4, maxLength: 100}

    SetupMfaRequest:
      type: object
      required: [method]
      properties:
        method: {type: string, enum: [NONE, TOTP, EMAIL]}

    SetupMfaResponse:
      type: object
      properties:
        method: {type: string, enum: [NONE, TOTP, EMAIL]}
        secret: {type: string}
        qrCodeUri: {type: string}
        recoveryCodes: {type: array, items: {type: string}}

    VerifyMfaRequest:
      type: object
      required: [code]
      properties:
        code: {type: string}

    DisableMfaRequest:
      type: object
      required: [password]
      properties:
        password: {type: string}

    MfaLoginRequest:
      type: object
      required: [email, password, mfaCode]
      properties:
        email: {type: string, format: email}
        password: {type: string}
        mfaCode: {type: string}

    # ============================================================
    # CORE MODULE - User DTOs
    # ============================================================
    UserResponse:
      type: object
      properties:
        id: {type: string, format: uuid}
        email: {type: string}
        displayName: {type: string}
        avatarUrl: {type: string}
        isActive: {type: boolean}
        lastLoginAt: {type: string, format: date-time}
        mfaEnabled: {type: boolean}
        mfaMethod: {type: string, enum: [NONE, TOTP, EMAIL]}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}

    UpdateProfileRequest:
      type: object
      properties:
        displayName: {type: string, maxLength: 100}
        avatarUrl: {type: string, maxLength: 500}

    # ============================================================
    # CORE MODULE - Team DTOs
    # ============================================================
    CreateTeamRequest:
      type: object
      required: [name]
      properties:
        name: {type: string, maxLength: 100}
        description: {type: string}
        teamsWebhookUrl: {type: string, maxLength: 500}
        settingsJson: {type: string}

    UpdateTeamRequest:
      type: object
      properties:
        name: {type: string, maxLength: 100}
        description: {type: string}
        teamsWebhookUrl: {type: string, maxLength: 500}
        settingsJson: {type: string}

    TeamResponse:
      type: object
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        description: {type: string}
        teamsWebhookUrl: {type: string}
        settingsJson: {type: string}
        ownerId: {type: string, format: uuid}
        ownerName: {type: string}
        memberCount: {type: integer}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}

    TeamMemberResponse:
      type: object
      properties:
        id: {type: string, format: uuid}
        teamId: {type: string, format: uuid}
        userId: {type: string, format: uuid}
        email: {type: string}
        displayName: {type: string}
        avatarUrl: {type: string}
        role: {type: string, enum: [OWNER, ADMIN, MEMBER, VIEWER]}
        joinedAt: {type: string, format: date-time}

    AddTeamMemberRequest:
      type: object
      required: [email, role]
      properties:
        email: {type: string, format: email}
        role: {type: string, enum: [OWNER, ADMIN, MEMBER, VIEWER]}

    UpdateMemberRoleRequest:
      type: object
      required: [role]
      properties:
        role: {type: string, enum: [OWNER, ADMIN, MEMBER, VIEWER]}

    InviteMemberRequest:
      type: object
      required: [email, role]
      properties:
        email: {type: string, format: email}
        role: {type: string, enum: [OWNER, ADMIN, MEMBER, VIEWER]}

    InvitationResponse:
      type: object
      properties:
        id: {type: string, format: uuid}
        email: {type: string}
        teamId: {type: string, format: uuid}
        teamName: {type: string}
        role: {type: string, enum: [OWNER, ADMIN, MEMBER, VIEWER]}
        status: {type: string, enum: [PENDING, ACCEPTED, EXPIRED, REVOKED]}
        invitedByName: {type: string}
        expiresAt: {type: string, format: date-time}
        createdAt: {type: string, format: date-time}

    # ============================================================
    # CORE MODULE - Admin DTOs
    # ============================================================
    AdminUserResponse:
      type: object
      properties:
        id: {type: string, format: uuid}
        email: {type: string}
        displayName: {type: string}
        avatarUrl: {type: string}
        isActive: {type: boolean}
        lastLoginAt: {type: string, format: date-time}
        mfaEnabled: {type: boolean}
        mfaMethod: {type: string}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
        teamCount: {type: integer}

    SystemSettingResponse:
      type: object
      properties:
        key: {type: string}
        value: {type: string}
        description: {type: string}
        updatedAt: {type: string, format: date-time}

    UpdateSystemSettingRequest:
      type: object
      required: [value]
      properties:
        value: {type: string}
        description: {type: string}

    AuditLogResponse:
      type: object
      properties:
        id: {type: integer, format: int64}
        userId: {type: string, format: uuid}
        action: {type: string}
        entityType: {type: string}
        entityId: {type: string}
        details: {type: string}
        ipAddress: {type: string}
        createdAt: {type: string, format: date-time}

    # ============================================================
    # CORE MODULE - Project DTOs
