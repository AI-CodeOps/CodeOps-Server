info:
  title: CodeOps Server API
  version: 1.0.0
  description: |
    Auto-generated OpenAPI specification for CodeOps-Server.
    Generated by Claude Code from source file analysis.

    **Generation timestamp:** 2026-02-26T01:46:00Z
    **Source commit:** 42d60f1ded704763d26368a69694c0050981ca19

    CodeOps is an AI-powered software maintenance platform. This API covers five modules:
    - **Core** — Authentication, teams, projects, personas, directives, jobs, reports, health monitoring
    - **Courier** — HTTP client / API testing tool (collections, requests, environments, variables)
    - **Logger** — Log management, metrics, dashboards, alerting, anomaly detection, tracing
    - **Registry** — Service registry, infrastructure, dependency management, topology, workstations
    - **Relay** — Team messaging (channels, DMs, file sharing, presence, reactions)

servers:
  - url: http://localhost:8090
    description: Local development

tags:
  # ── Core ──
  - name: Health
    description: Server health check
  - name: Auth
    description: Authentication — login, register, token refresh, password management
  - name: Admin
    description: System administration — user management, system settings
  - name: Compliance
    description: Compliance frameworks, standards, and audits
  - name: Dependencies
    description: Project dependency tracking and vulnerability management
  - name: Directives
    description: AI directives — reusable instructions assigned to projects
  - name: Findings
    description: Code analysis findings and remediation tracking
  - name: Health Monitor
    description: Project health scores and snapshot history
  - name: Integrations
    description: External service connections (GitHub, Jira, etc.)
  - name: Jobs
    description: Background job lifecycle management
  - name: Metrics
    description: Core platform metrics and analytics
  - name: Personas
    description: AI personas — system, team, and user-scoped personality configurations
  - name: Projects
    description: Project management within teams
  - name: Reports
    description: Generated analysis reports with file storage
  - name: Tasks
    description: Task management and tracking within projects
  - name: Teams
    description: Team creation, membership, invitations, and settings
  - name: Tech Debt
    description: Technical debt tracking and prioritization
  - name: Users
    description: User profile and account management

  # ── Courier ──
  - name: Courier - Health
    description: Courier module health check
  - name: Courier - Collections
    description: API request collections (like Postman collections)
  - name: Courier - Requests
    description: Individual HTTP request definitions within collections
  - name: Courier - Folders
    description: Folder organization within collections
  - name: Courier - Environments
    description: Environment variable sets for request execution
  - name: Courier - Variables
    description: Environment and collection variables
  - name: Courier - Runner
    description: Collection and request execution engine
  - name: Courier - History
    description: Request execution history and logs
  - name: Courier - Proxy
    description: HTTP proxy for executing API requests
  - name: Courier - Import
    description: Import collections from external formats (Postman, OpenAPI, etc.)
  - name: Courier - Share
    description: Collection sharing and collaboration
  - name: Courier - Code Generation
    description: Generate code snippets from request definitions
  - name: Courier - GraphQL
    description: GraphQL-specific request handling

  # ── Logger ──
  - name: Logger - Alerts
    description: Alert rules and notifications
  - name: Logger - Anomaly
    description: Anomaly detection and baseline analysis
  - name: Logger - Dashboards
    description: Custom monitoring dashboards and widgets
  - name: Logger - Log Ingestion
    description: Log entry ingestion and batch processing
  - name: Logger - Log Query
    description: Log search, filtering, and aggregation
  - name: Logger - Log Sources
    description: Log source configuration and management
  - name: Logger - Log Traps
    description: Log pattern matching traps and triggers
  - name: Logger - Metrics
    description: Time-series metrics collection and querying
  - name: Logger - Retention
    description: Log retention policies and cleanup
  - name: Logger - Traces
    description: Distributed trace collection and analysis

  # ── Registry ──
  - name: Registry - Services
    description: Service registration, metadata, and lifecycle
  - name: Registry - Config
    description: Configuration templates and generation
  - name: Registry - Dependencies
    description: Service-to-service dependency mapping
  - name: Registry - Health Management
    description: Service health checks and status monitoring
  - name: Registry - Infrastructure
    description: Infrastructure component management
  - name: Registry - Ports
    description: Port allocation and conflict detection
  - name: Registry - Routes
    description: API route and gateway configuration
  - name: Registry - Solutions
    description: Solution grouping of related services
  - name: Registry - Topology
    description: Service topology visualization and neighborhood analysis
  - name: Registry - Workstations
    description: Developer workstation profiles and service sets

  # ── Relay ──
  - name: Relay - Health
    description: Relay module health check
  - name: Relay - Channels
    description: Team messaging channels (create, join, leave, manage)
  - name: Relay - Messages
    description: Channel message CRUD and history
  - name: Relay - Direct Messages
    description: One-on-one and group direct message conversations
  - name: Relay - Files
    description: File upload and attachment management
  - name: Relay - Reactions
    description: Message emoji reactions
  - name: Relay - Presence
    description: User online/offline presence and status
  - name: Relay - Platform Events
    description: Platform-wide event stream

paths:
  # ═══════════════════════════════════════════════════════
  # Health Controller (config package)
  # ═══════════════════════════════════════════════════════
  /api/v1/health:
    get:
      summary: Server health check
      operationId: health
      tags: [Health]
      security: []
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP
                  service:
                    type: string
                    example: codeops-server
                  timestamp:
                    type: string
                    format: date-time

  # ═══════════════════════════════════════════════════════
  # Auth Controller
  # ═══════════════════════════════════════════════════════
  /api/v1/auth/register:
    post:
      summary: Register new user
      operationId: register
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/v1/auth/login:
    post:
      summary: Authenticate user with email and password
      operationId: login
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful (or MFA challenge issued)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Invalid credentials

  /api/v1/auth/refresh:
    post:
      summary: Refresh access token using refresh token
      operationId: refresh
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Invalid or expired refresh token

  /api/v1/auth/logout:
    post:
      summary: Logout by blacklisting current JWT
      operationId: logout
      tags: [Auth]
      security:
        - bearerAuth: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Logout successful
        '401':
          description: Not authenticated

  /api/v1/auth/change-password:
    post:
      summary: Change password for current user
