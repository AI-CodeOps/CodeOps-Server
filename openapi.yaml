openapi: 3.0.1
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost:8090
  description: Generated server url
tags:
- name: Runner
  description: Collection runner for batch request execution
- name: Alerts
  description: "Manage alert channels, rules, and history"
- name: Environments
  description: "Environment CRUD, activation, cloning, and variable management"
- name: Proxy
  description: HTTP proxy for ad-hoc and stored request execution
- name: GraphQL
  description: "GraphQL query execution, introspection, validation, and formatting"
- name: Requests
  description: "Request CRUD, components, duplication, move, reorder, and execution"
- name: Collections
  description: "Collection CRUD, forking, export, and search"
- name: Shares
  description: "Collection sharing, permissions, and access management"
- name: Anomaly Detection
  description: "Anomaly baselines, checks, and reports"
- name: Dashboards
  description: "Dashboard CRUD, widget management, templates, and layouts"
- name: Health
  description: Public health check endpoint
- name: Log Ingestion
  description: Ingest log entries via HTTP push
- name: Retention
  description: Data retention policy management and storage monitoring
- name: Code Generation
  description: Generate code snippets from API requests
- name: Log Traps
  description: Manage log traps and test definitions
- name: Folders
  description: "Folder CRUD, move, reorder, and content listing"
- name: Log Query
  description: "Query, search, and manage saved queries"
- name: Metrics
  description: "Application metrics registration, data ingestion, and querying"
- name: History
  description: "Request execution history, search, and cleanup"
- name: Global Variables
  description: Team-scoped global variable CRUD
- name: Log Sources
  description: Manage log sources (services)
- name: Traces
  description: "Distributed tracing: span ingestion, flow visualization, and analysis"
- name: Import
  description: "Import collections from Postman, OpenAPI, and cURL formats"
