openapi: 3.0.3
info:
  title: CodeOps Server API
  version: 1.0.0
  description: |
    Complete OpenAPI specification for the CodeOps Server platform.
    Generated by Claude Code from source file analysis.

    **Generation timestamp:** 2026-02-28T01:55:00Z
    **Source commit:** 6c5dd60b4b69a02473999d8a3a003995b7b10d3b

    ## Modules
    - **Core** — Authentication, users, teams, projects, QA jobs, findings, tasks, compliance, tech debt, dependencies, health monitoring, personas, directives, integrations, reports, admin
    - **Courier** — API client (collections, folders, requests, environments, variables, proxy, history, runner, sharing, import/export, GraphQL, code generation)
    - **Fleet** — Docker container management (containers, service profiles, solution profiles, workstation profiles, images, volumes, networks)
    - **Logger** — Centralized logging (log ingestion, querying, sources, traps, alerts, metrics, dashboards, retention, traces, anomaly detection)
    - **Registry** — Service registry (services, dependencies, ports, routes, infrastructure, config, solutions, topology, health, workstations)
    - **Relay** — Team messaging (channels, messages, direct messages, reactions, files, presence, platform events, WebSocket)

servers:
  - url: http://localhost:8090
    description: Local development
  - url: https://api.codeops.io
    description: Production

tags:
  # Core
  - name: Health
    description: Health check endpoints
  - name: Auth
    description: Authentication, registration, MFA, token management
  - name: Users
    description: User profile management
  - name: Teams
    description: Team CRUD, membership, invitations
  - name: Projects
    description: Project CRUD and archival
  - name: Jobs
    description: QA job management, agent runs, bug investigations
  - name: Findings
    description: QA findings management
  - name: Tasks
    description: Remediation task management
  - name: Compliance
    description: Compliance specifications and items
  - name: Tech Debt
    description: Technical debt tracking
  - name: Dependencies
    description: Dependency scanning and vulnerabilities
  - name: Health Monitor
    description: Health schedules and snapshots
  - name: Metrics
    description: Project and team metrics
  - name: Personas
