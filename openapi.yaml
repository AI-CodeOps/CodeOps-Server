        ipAddress:
          type: string

    FleetHealthSummaryResponse:
      type: object
      description: Aggregated fleet health summary across all containers in a team.
      properties:
        totalContainers:
          type: integer
          format: int32
        runningContainers:
          type: integer
          format: int32
        stoppedContainers:
          type: integer
          format: int32
        unhealthyContainers:
          type: integer
          format: int32
        restartingContainers:
          type: integer
          format: int32
        totalCpuPercent:
          type: number
          format: double
        totalMemoryBytes:
          type: integer
          format: int64
        totalMemoryLimitBytes:
          type: integer
          format: int64
        timestamp:
          type: string
          format: date-time

    ContainerStatsResponse:
      type: object
      description: Real-time container resource statistics response.
      properties:
        containerId:
          type: string
          format: uuid
        containerName:
          type: string
        cpuPercent:
          type: number
          format: double
        memoryUsageBytes:
          type: integer
          format: int64
        memoryLimitBytes:
          type: integer
          format: int64
        networkRxBytes:
          type: integer
          format: int64
        networkTxBytes:
          type: integer
          format: int64
        blockReadBytes:
          type: integer
          format: int64
        blockWriteBytes:
          type: integer
          format: int64
        pids:
          type: integer
          format: int32
        timestamp:
          type: string
          format: date-time

    DockerImageResponse:
      type: object
      description: Docker image metadata response.
      properties:
        id:
          type: string
        repoTags:
          type: array
          items:
            type: string
        sizeBytes:
          type: integer
          format: int64
        created:
          type: string
          format: date-time

    DockerVolumeResponse:
      type: object
      description: Docker volume metadata response.
      properties:
        name:
          type: string
        driver:
          type: string
        mountpoint:
          type: string
        labels:
          type: object
          additionalProperties:
            type: string
        createdAt:
          type: string
          format: date-time

    DockerNetworkResponse:
      type: object
      description: Docker network metadata response.
      properties:
        id:
          type: string
        name:
          type: string
        driver:
          type: string
        subnet:
          type: string
        gateway:
          type: string
        connectedContainers:
          type: array
          items:
            type: string
    # ════════════════════════════════════════════════════════════
    # Shared Parameters
    # ════════════════════════════════════════════════════════════

    # NOTE: Place this under components/parameters:
    #   XTeamIdHeader:
    #     name: X-Team-Id
    #     in: header
    #     required: true
    #     schema:
    #       type: string
    #       format: uuid
    #     description: Team identifier (UUID) extracted from X-Team-Id header

    # ════════════════════════════════════════════════════════════
    # Enums
    # ════════════════════════════════════════════════════════════

    LogLevel:
      type: string
      description: Log severity levels, ordered from most verbose to most severe
      enum:
        - TRACE
        - DEBUG
        - INFO
        - WARN
        - ERROR
        - FATAL

    AlertSeverity:
      type: string
      description: Severity levels for alerts fired by traps
      enum:
        - INFO
        - WARNING
        - CRITICAL

    AlertStatus:
      type: string
      description: Lifecycle states of a fired alert
      enum:
        - FIRED
        - ACKNOWLEDGED
        - RESOLVED

    AlertChannelType:
      type: string
      description: Supported notification channel types for alert delivery
      enum:
        - EMAIL
        - WEBHOOK
        - TEAMS
        - SLACK

    ConditionType:
      type: string
      description: Specific condition evaluation strategies within a trap
      enum:
        - REGEX
        - KEYWORD
        - FREQUENCY_THRESHOLD
        - ABSENCE

    TrapType:
      type: string
      description: Classification of log trap trigger mechanisms
      enum:
        - PATTERN
        - FREQUENCY
        - ABSENCE

    MetricType:
      type: string
      description: Types of metrics that can be collected and stored
      enum:
        - COUNTER
        - GAUGE
        - HISTOGRAM
        - TIMER

    WidgetType:
      type: string
      description: Available widget types for dashboard composition
      enum:
        - LOG_STREAM
        - TIME_SERIES_CHART
        - COUNTER
        - GAUGE
        - TABLE
        - HEATMAP
        - PIE_CHART
        - BAR_CHART

    RetentionAction:
      type: string
      description: Actions to perform when log retention policy triggers
      enum:
        - PURGE
        - ARCHIVE

    SpanStatus:
      type: string
      description: Status of a trace span indicating success or failure
      enum:
        - OK
        - ERROR

    # ════════════════════════════════════════════════════════════
    # Error Response
    # ════════════════════════════════════════════════════════════

    ErrorResponse:
      type: object
      description: Standard error response body returned by all exception handlers
      required:
        - status
        - message
      properties:
        status:
          type: integer
          description: HTTP status code
        message:
          type: string
          description: Human-readable error message

