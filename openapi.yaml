# ============================================================================
# Relay Module — WebSocket STOMP Endpoints (NOT REST)
#
# These endpoints are handled via STOMP over WebSocket and are NOT REST paths.
# Clients connect to the STOMP broker and send/receive messages on these
# application destinations. An authenticated StompPrincipal is required.
#
#   SEND /app/channel.typing
#     Payload: TypingIndicatorRequest { channelId: UUID }
#     Broadcasts typing indicator to channel members via /topic/channel.{channelId}.typing
#
#   SEND /app/dm.typing
#     Payload: DmTypingRequest { conversationId: UUID }
#     Sends typing indicator to DM conversation participants via /user/{recipientId}/queue/dm.typing
#
#   SEND /app/presence.heartbeat
#     Payload: HeartbeatRequest { teamId: UUID }
#     Records presence heartbeat and broadcasts update via /topic/team.{teamId}.presence
# ============================================================================

  # ── Relay - Health ──────────────────────────────────────────────────────────

  /api/v1/relay/health:
    get:
      tags:
        - Relay - Health
      summary: Relay module health check
      description: >
        Returns the health status of the Relay module. This endpoint is
        unauthenticated and used by load balancers and monitoring systems.
      operationId: relayHealth
      responses:
        '200':
          description: Module is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP
                  module:
                    type: string
                    example: relay
                  timestamp:
                    type: string
                    format: date-time

  # ── Relay - Channels ────────────────────────────────────────────────────────

