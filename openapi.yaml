          type: boolean

    # ════════════════════════════════════════════════════════════
    # Request DTOs - Ingestion
    # ════════════════════════════════════════════════════════════

    IngestLogEntryRequest:
      type: object
      description: Request DTO for ingesting a single log entry via HTTP push
      required:
        - level
        - message
        - serviceName
      properties:
        level:
          type: string
          description: Log level
          minLength: 1
        message:
          type: string
          description: Log message
          minLength: 1
          maxLength: 65536
        timestamp:
          type: string
          format: date-time
          description: ISO-8601 timestamp when the log was generated. Defaults to server time if null.
        serviceName:
          type: string
          description: Name of the source service
          minLength: 1
          maxLength: 200
        correlationId:
          type: string
          maxLength: 100
        traceId:
          type: string
          maxLength: 100
        spanId:
          type: string
          maxLength: 100
        loggerName:
          type: string
          maxLength: 500
        threadName:
          type: string
          maxLength: 200
        exceptionClass:
          type: string
          maxLength: 500
        exceptionMessage:
          type: string
        stackTrace:
          type: string
        customFields:
          type: string
          description: Arbitrary key-value pairs as JSON string
        hostName:
          type: string
          maxLength: 200
        ipAddress:
          type: string
          maxLength: 45

    IngestLogBatchRequest:
      type: object
      description: Request DTO for batch ingestion of multiple log entries
      required:
        - entries
      properties:
        entries:
          type: array
          minItems: 1
          maxItems: 1000
          items:
            $ref: '#/components/schemas/IngestLogEntryRequest'

    # ════════════════════════════════════════════════════════════
    # Request DTOs - Query
    # ════════════════════════════════════════════════════════════

    LogQueryRequest:
      type: object
      description: Request DTO for querying logs with structured filters
      properties:
        serviceName:
          type: string
        level:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        correlationId:
          type: string
        query:
          type: string
        loggerName:
          type: string
        exceptionClass:
          type: string
        hostName:
          type: string
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1
          maximum: 100

    DslQueryRequest:
      type: object
      description: Request DTO for executing a DSL (SQL-like) log query
      required:
        - query
      properties:
        query:
          type: string
          description: DSL query string
          minLength: 1
          maxLength: 2000
        page:
          type: integer
          minimum: 0
        size:
          type: integer
          minimum: 1
          maximum: 100

    CreateSavedQueryRequest:
      type: object
      description: Request DTO for saving a log query
      required:
        - name
        - queryJson
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        queryJson:
          type: string
          description: JSON representation of the query
          minLength: 1
        queryDsl:
          type: string
          description: DSL representation of the query
        isShared:
          type: boolean
          description: Whether the query is visible to other team members

    UpdateSavedQueryRequest:
      type: object
      description: Request DTO for updating a saved query
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        queryJson:
          type: string
        queryDsl:
          type: string
        isShared:
          type: boolean

    # ════════════════════════════════════════════════════════════
    # Request DTOs - Sources
    # ════════════════════════════════════════════════════════════

    CreateLogSourceRequest:
      type: object
      description: Request DTO for registering a new log source
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        serviceId:
          type: string
          format: uuid
        description:
          type: string
          maxLength: 5000
        environment:
          type: string
          maxLength: 50

    UpdateLogSourceRequest:
      type: object
      description: Request DTO for updating a log source
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        environment:
          type: string
          maxLength: 50
        isActive:
          type: boolean

    # ════════════════════════════════════════════════════════════
    # Request DTOs - Traps
    # ════════════════════════════════════════════════════════════

    CreateLogTrapRequest:
      type: object
      description: Request DTO for creating a log trap with conditions
      required:
        - name
        - trapType
        - conditions
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
        trapType:
          type: string
          description: Trap classification (PATTERN, FREQUENCY, ABSENCE)
          minLength: 1
        conditions:
          type: array
          minItems: 1
          maxItems: 10
          items:
            $ref: '#/components/schemas/CreateTrapConditionRequest'

    UpdateLogTrapRequest:
      type: object
      description: Request DTO for updating a log trap
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
        trapType:
          type: string
        isActive:
          type: boolean
        conditions:
          type: array
          maxItems: 10
          items:
            $ref: '#/components/schemas/CreateTrapConditionRequest'

    CreateTrapConditionRequest:
      type: object
      description: Request DTO for a condition within a log trap
      required:
        - conditionType
        - field
      properties:
        conditionType:
          type: string
          description: Condition evaluation strategy (REGEX, KEYWORD, FREQUENCY_THRESHOLD, ABSENCE)
          minLength: 1
        field:
          type: string
          description: Log field to evaluate
          minLength: 1
          maxLength: 100
        pattern:
          type: string
          description: Regex or keyword pattern
        threshold:
          type: integer
          minimum: 1
          description: Trigger threshold count
        windowSeconds:
          type: integer
          minimum: 1
          description: Time window in seconds for frequency/absence checks
        serviceName:
          type: string
          maxLength: 200
        logLevel:
          type: string

    TestTrapRequest:
      type: object
      description: Request DTO for testing a trap against historical logs
      required:
        - hoursBack
      properties:
        hoursBack:
          type: integer
          minimum: 1
          maximum: 168
          description: Hours of history to scan (max 7 days)

    # ════════════════════════════════════════════════════════════
    # Request DTOs - Alerts
    # ════════════════════════════════════════════════════════════

    CreateAlertChannelRequest:
      type: object
      description: Request DTO for creating an alert notification channel
      required:
        - name
        - channelType
        - configuration
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        channelType:
          type: string
          description: Channel type (EMAIL, WEBHOOK, TEAMS, SLACK)
          minLength: 1
        configuration:
          type: string
          description: JSON configuration for the channel
          minLength: 1

    UpdateAlertChannelRequest:
      type: object
      description: Request DTO for updating an alert channel
      properties:
        name:
          type: string
          maxLength: 200
        configuration:
          type: string
        isActive:
          type: boolean

    CreateAlertRuleRequest:
      type: object
      description: Request DTO for creating an alert rule connecting a trap to a channel
      required:
        - name
        - trapId
        - channelId
        - severity
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        trapId:
          type: string
          format: uuid
        channelId:
          type: string
          format: uuid
        severity:
          type: string
          description: Alert severity (INFO, WARNING, CRITICAL)
          minLength: 1
        throttleMinutes:
          type: integer
          minimum: 1
          maximum: 1440
          description: Minimum minutes between repeated alerts

    UpdateAlertRuleRequest:
      type: object
      description: Request DTO for updating an alert rule
      properties:
        name:
          type: string
          maxLength: 200
        trapId:
          type: string
          format: uuid
        channelId:
          type: string
          format: uuid
        severity:
          type: string
        isActive:
          type: boolean
        throttleMinutes:
          type: integer
          minimum: 1
          maximum: 1440

    UpdateAlertStatusRequest:
      type: object
      description: Request DTO for acknowledging or resolving a fired alert
      required:
        - status
      properties:
        status:
          type: string
          description: New alert status (ACKNOWLEDGED, RESOLVED)
          minLength: 1

    # ════════════════════════════════════════════════════════════
    # Request DTOs - Metrics
    # ════════════════════════════════════════════════════════════

    RegisterMetricRequest:
      type: object
      description: Request DTO for registering a new metric definition
      required:
        - name
        - metricType
        - serviceName
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        metricType:
          type: string
          description: Metric type (COUNTER, GAUGE, HISTOGRAM, TIMER)
          minLength: 1
        description:
          type: string
          maxLength: 5000
        unit:
          type: string
          maxLength: 50
        serviceName:
          type: string
          minLength: 1
          maxLength: 200
        tags:
          type: string
          description: JSON key-value tags

    UpdateMetricRequest:
      type: object
      description: Request DTO for updating a metric definition
      properties:
        description:
          type: string
          maxLength: 5000
        unit:
          type: string
          maxLength: 50
        tags:
          type: string

    PushMetricDataRequest:
      type: object
      description: Request DTO for pushing metric data points
      required:
        - metricId
        - dataPoints
      properties:
        metricId:
          type: string
          format: uuid
        dataPoints:
          type: array
          minItems: 1
          maxItems: 1000
          items:
            $ref: '#/components/schemas/MetricDataPoint'

    MetricDataPoint:
      type: object
      description: Individual metric data point within a push request
      required:
        - timestamp
        - value
      properties:
        timestamp:
          type: string
          format: date-time
        value:
          type: number
          format: double
        tags:
          type: string
          description: JSON dimension tags

    MetricQueryRequest:
      type: object
      description: Request DTO for querying metric time-series data
      required:
        - metricId
        - startTime
        - endTime
      properties:
        metricId:
          type: string
          format: uuid
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        resolution:
          type: integer
          minimum: 10
          maximum: 3600
          description: Aggregation window in seconds. Null returns raw data points.

    # ════════════════════════════════════════════════════════════
    # Request DTOs - Dashboards
    # ════════════════════════════════════════════════════════════

    CreateDashboardRequest:
      type: object
      description: Request DTO for creating a new dashboard
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        isShared:
          type: boolean
        refreshIntervalSeconds:
          type: integer
          minimum: 5
          maximum: 3600
        layoutJson:
          type: string
          description: JSON layout configuration

    UpdateDashboardRequest:
      type: object
      description: Request DTO for updating a dashboard
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 5000
        isShared:
          type: boolean
        isTemplate:
          type: boolean
        refreshIntervalSeconds:
          type: integer
          minimum: 5
          maximum: 3600
        layoutJson:
          type: string

    CreateDashboardWidgetRequest:
      type: object
      description: Request DTO for adding a widget to a dashboard
      required:
        - title
        - widgetType
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        widgetType:
          type: string
          description: Widget type (LOG_STREAM, TIME_SERIES_CHART, COUNTER, GAUGE, TABLE, HEATMAP, PIE_CHART, BAR_CHART)
          minLength: 1
        queryJson:
          type: string
          description: JSON query configuration for the widget
        configJson:
          type: string
          description: JSON display configuration for the widget
        gridX:
          type: integer
          minimum: 0
        gridY:
          type: integer
          minimum: 0
        gridWidth:
          type: integer
          minimum: 1
          maximum: 12
        gridHeight:
          type: integer
          minimum: 1
          maximum: 12
        sortOrder:
          type: integer

    UpdateDashboardWidgetRequest:
      type: object
      description: Request DTO for updating a dashboard widget
      properties:
        title:
          type: string
          maxLength: 200
        widgetType:
          type: string
        queryJson:
          type: string
        configJson:
          type: string
        gridX:
          type: integer
          minimum: 0
        gridY:
          type: integer
          minimum: 0
        gridWidth:
          type: integer
          minimum: 1
          maximum: 12
        gridHeight:
          type: integer
          minimum: 1
          maximum: 12
        sortOrder:
          type: integer

    ReorderWidgetsRequest:
      type: object
      description: Request DTO for reordering widgets within a dashboard
      required:
