    # ══════════════════════════════════════════════════════════════
    # Fleet Enums
    # ══════════════════════════════════════════════════════════════

    ContainerStatus:
      type: string
      description: Lifecycle state of a Docker container managed by Fleet.
      enum:
        - CREATED
        - RUNNING
        - PAUSED
        - RESTARTING
        - REMOVING
        - EXITED
        - DEAD
        - STOPPED

    HealthStatus:
      type: string
      description: Health check result status for a container.
      enum:
        - HEALTHY
        - UNHEALTHY
        - STARTING
        - NONE

    RestartPolicy:
      type: string
      description: Docker restart policy for a container.
      enum:
        - "NO"
        - ALWAYS
        - ON_FAILURE
        - UNLESS_STOPPED

    DeploymentAction:
      type: string
      description: Type of deployment lifecycle action.
      enum:
        - START
        - STOP
        - RESTART
        - DESTROY
        - SCALE_UP
        - SCALE_DOWN

    # ══════════════════════════════════════════════════════════════
    # Fleet Request DTOs
    # ══════════════════════════════════════════════════════════════

    StartContainerRequest:
      type: object
      description: Request to start a container from a service profile.
      required:
        - serviceProfileId
      properties:
        serviceProfileId:
          type: string
          format: uuid
        containerNameOverride:
          type: string
        imageTagOverride:
          type: string
        envVarOverrides:
          type: object
          additionalProperties:
            type: string
        restartPolicyOverride:
          $ref: '#/components/schemas/RestartPolicy'

    ContainerExecRequest:
      type: object
      description: Request to execute a command inside a running container.
      required:
        - command
      properties:
        command:
          type: string
          minLength: 1
          maxLength: 2000
        attachStdout:
          type: boolean
        attachStderr:
          type: boolean

    CreateServiceProfileRequest:
      type: object
      description: Request to create a new service profile for Docker container configuration.
      required:
        - serviceName
        - imageName
      properties:
        serviceName:
          type: string
          minLength: 1
          maxLength: 200
        displayName:
          type: string
          maxLength: 200
        description:
          type: string
        imageName:
          type: string
          minLength: 1
          maxLength: 500
        imageTag:
          type: string
          maxLength: 100
        command:
          type: string
        workingDir:
          type: string
          maxLength: 500
        envVarsJson:
          type: string
          description: JSON-encoded environment variables map.
        portsJson:
          type: string
          description: JSON-encoded port mappings.
        healthCheckCommand:
          type: string
        healthCheckIntervalSeconds:
          type: integer
          format: int32
        healthCheckTimeoutSeconds:
          type: integer
          format: int32
        healthCheckRetries:
          type: integer
          format: int32
        restartPolicy:
          $ref: '#/components/schemas/RestartPolicy'
        memoryLimitMb:
          type: integer
          format: int32
        cpuLimit:
          type: number
          format: double
        startOrder:
          type: integer
          format: int32
        serviceRegistrationId:
          type: string
          format: uuid

    UpdateServiceProfileRequest:
      type: object
      description: Request to update an existing service profile.
      properties:
        displayName:
          type: string
          maxLength: 200
        description:
          type: string
        imageName:
          type: string
          maxLength: 500
        imageTag:
          type: string
          maxLength: 100
        command:
          type: string
        workingDir:
          type: string
          maxLength: 500
        envVarsJson:
          type: string
          description: JSON-encoded environment variables map.
        portsJson:
          type: string
          description: JSON-encoded port mappings.
        healthCheckCommand:
          type: string
        healthCheckIntervalSeconds:
          type: integer
          format: int32
        healthCheckTimeoutSeconds:
          type: integer
          format: int32
        healthCheckRetries:
          type: integer
          format: int32
        restartPolicy:
          $ref: '#/components/schemas/RestartPolicy'
        memoryLimitMb:
          type: integer
          format: int32
        cpuLimit:
          type: number
          format: double
        isEnabled:
          type: boolean
        startOrder:
          type: integer
          format: int32

    CreateSolutionProfileRequest:
      type: object
      description: Request to create a new solution profile grouping service profiles.
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
        isDefault:
          type: boolean

    UpdateSolutionProfileRequest:
      type: object
      description: Request to update an existing solution profile.
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
        isDefault:
          type: boolean

    AddSolutionServiceRequest:
      type: object
      description: Request to add a service profile to a solution profile.
      required:
        - serviceProfileId
      properties:
        serviceProfileId:
          type: string
          format: uuid
        startOrder:
          type: integer
          format: int32

    CreateWorkstationProfileRequest:
      type: object
      description: Request to create a new workstation profile for local development environments.
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
        isDefault:
          type: boolean

    UpdateWorkstationProfileRequest:
      type: object
      description: Request to update an existing workstation profile.
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
        isDefault:
          type: boolean

    AddWorkstationSolutionRequest:
      type: object
      description: Request to add a solution profile to a workstation profile.
      required:
        - solutionProfileId
      properties:
        solutionProfileId:
          type: string
          format: uuid
        startOrder:
          type: integer
          format: int32
        overrideEnvVarsJson:
          type: string
          description: JSON-encoded environment variable overrides.

    CreateVolumeMountRequest:
      type: object
      description: Request to create a volume mount for a service profile.
      required:
        - containerPath
      properties:
        hostPath:
          type: string
          maxLength: 500
        containerPath:
          type: string
          minLength: 1
          maxLength: 500
        volumeName:
          type: string
          maxLength: 200
        isReadOnly:
          type: boolean

    CreateNetworkConfigRequest:
      type: object
      description: Request to create a network configuration for a service profile.
      required:
        - networkName
      properties:
        networkName:
          type: string
          minLength: 1
          maxLength: 200
        aliases:
          type: string
        ipAddress:
          type: string
          maxLength: 45

