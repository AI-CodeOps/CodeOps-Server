    # ══════════════════════════════════════════════════════════════
    #  Relay Module — Enums
    # ══════════════════════════════════════════════════════════════

    ChannelType:
      type: string
      description: Classification of messaging channels.
      enum:
        - PUBLIC
        - PRIVATE
        - PROJECT
        - SERVICE

    MessageType:
      type: string
      description: Type of message content.
      enum:
        - TEXT
        - SYSTEM
        - PLATFORM_EVENT
        - FILE

    ReactionType:
      type: string
      description: Reaction classification.
      enum:
        - EMOJI

    PresenceStatus:
      type: string
      description: User online status.
      enum:
        - ONLINE
        - AWAY
        - DND
        - OFFLINE

    PlatformEventType:
      type: string
      description: Types of cross-module events posted to channels.
      enum:
        - AUDIT_COMPLETED
        - ALERT_FIRED
        - SESSION_COMPLETED
        - SECRET_ROTATED
        - CONTAINER_CRASHED
        - SERVICE_REGISTERED
        - DEPLOYMENT_COMPLETED
        - BUILD_COMPLETED
        - FINDING_CRITICAL
        - MERGE_REQUEST_CREATED

    FileUploadStatus:
      type: string
      description: File attachment upload lifecycle.
      enum:
        - UPLOADING
        - COMPLETE
        - FAILED

    ConversationType:
      type: string
      description: Direct conversation types.
      enum:
        - ONE_ON_ONE
        - GROUP

    MemberRole:
      type: string
      description: Channel member roles.
      enum:
        - OWNER
        - ADMIN
        - MEMBER

    # ══════════════════════════════════════════════════════════════
    #  Relay Module — Request DTOs
    # ══════════════════════════════════════════════════════════════

    CreateChannelRequest:
      type: object
      required:
        - name
        - channelType
      properties:
        name:
          type: string
          maxLength: 100
          minLength: 1
          description: Channel name (required, non-blank)
        description:
          type: string
          description: Optional channel description
        channelType:
          $ref: '#/components/schemas/ChannelType'
        topic:
          type: string
          maxLength: 500
          description: Optional channel topic

    UpdateChannelRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
          description: Updated channel name
        description:
          type: string
          description: Updated channel description
        isArchived:
          type: boolean
          description: Archive or unarchive the channel

    UpdateChannelTopicRequest:
      type: object
      properties:
        topic:
          type: string
          maxLength: 500
          description: Updated channel topic

    SendMessageRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          maxLength: 10000
          minLength: 1
          description: Message content (required, non-blank)
        parentId:
          type: string
          format: uuid
          description: Parent message ID for threading (optional)
        mentionedUserIds:
          type: array
          items:
            type: string
            format: uuid
          description: List of mentioned user IDs (optional)
        mentionsEveryone:
          type: boolean
          description: Whether the message mentions everyone (optional)

    UpdateMessageRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          maxLength: 10000
          minLength: 1
          description: Updated message content (required, non-blank)

    CreateDirectConversationRequest:
      type: object
      required:
        - participantIds
      properties:
        participantIds:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
          description: List of participant user IDs (required, non-empty). Current user is auto-added.
        name:
          type: string
          description: Optional conversation name (for group DMs)

    SendDirectMessageRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          maxLength: 10000
          minLength: 1
          description: Direct message content (required, non-blank)

    UpdateDirectMessageRequest:
      type: object
      required:
        - content
      properties:
        content:
          type: string
          maxLength: 10000
          minLength: 1
          description: Updated direct message content (required, non-blank)

    AddReactionRequest:
      type: object
      required:
        - emoji
      properties:
        emoji:
          type: string
          maxLength: 50
          minLength: 1
          description: Emoji string (required, non-blank)

    UploadFileRequest:
      type: object
      description: >
        Metadata for a file upload. Actual file content arrives via
        MultipartFile. This DTO is used internally; the REST endpoint
        accepts multipart/form-data directly.
      properties:
        messageId:
          type: string
          format: uuid
          description: Channel message ID to attach the file to
        directMessageId:
          type: string
          format: uuid
          description: Direct message ID to attach the file to

    UpdatePresenceRequest:
      type: object
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/PresenceStatus'
        statusMessage:
          type: string
          maxLength: 200
          description: Optional custom status message

    InviteMemberRequest:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string
          format: uuid
          description: The user ID to invite (required)
        role:
          $ref: '#/components/schemas/MemberRole'
          description: Optional role assignment (defaults to MEMBER)

    UpdateMemberRoleRequest:
      type: object
      required:
        - role
      properties:
        role:
          $ref: '#/components/schemas/MemberRole'

    PinMessageRequest:
      type: object
      required:
        - messageId
      properties:
        messageId:
          type: string
          format: uuid
          description: The message ID to pin (required)

    MarkReadRequest:
      type: object
      required:
        - lastReadMessageId
      properties:
        lastReadMessageId:
          type: string
          format: uuid
          description: The last read message ID (required)

    # WebSocket STOMP request DTOs (not used via REST)

    TypingIndicatorRequest:
      type: object
      description: >
        WebSocket STOMP payload for broadcasting a typing indicator in a
        channel. Sent to /app/channel.typing.
      properties:
        channelId:
          type: string
          format: uuid
          description: The channel where the user is typing

    DmTypingRequest:
      type: object
      description: >
        WebSocket STOMP payload for broadcasting a typing indicator in a
        direct conversation. Sent to /app/dm.typing.
      properties:
        conversationId:
          type: string
          format: uuid
          description: The DM conversation where the user is typing

    HeartbeatRequest:
      type: object
      description: >
        WebSocket STOMP payload for a presence heartbeat.
        Sent to /app/presence.heartbeat.
      properties:
        teamId:
          type: string
          format: uuid
          description: The team to report presence for

