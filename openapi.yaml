components:
  parameters:
    X-Team-ID:
      name: X-Team-Id
      in: header
      required: true
      description: UUID of the team context for the request
      schema:
        type: string
        format: uuid
    XTeamIdHeader:
      name: X-Team-Id
      in: header
      required: true
      description: UUID of the team context for the request
      schema:
        type: string
        format: uuid

  schemas:
    # === COMMON SCHEMAS ===
    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          description: HTTP status code
        message:
          type: string
          description: Error message

    PageResponse:
      type: object
      description: Generic paginated response wrapper
      properties:
        content:
          type: array
          items: {}
          description: Page content
        page:
          type: integer
          description: Current page number (0-indexed)
        size:
          type: integer
          description: Page size
        totalElements:
          type: integer
          format: int64
          description: Total number of elements
        totalPages:
          type: integer
          description: Total number of pages

    # ──────────────────────────────────────────────
    # Enums
    # ──────────────────────────────────────────────
    TeamRole:
      type: string
      enum: [OWNER, ADMIN, MEMBER, VIEWER]

    InvitationStatus:
      type: string
      enum: [PENDING, ACCEPTED, EXPIRED]

    JobMode:
      type: string
      enum: [AUDIT, COMPLIANCE, BUG_INVESTIGATE, REMEDIATE, TECH_DEBT, DEPENDENCY, HEALTH_MONITOR]

    JobStatus:
      type: string
      enum: [PENDING, RUNNING, COMPLETED, FAILED, CANCELLED]

    JobResult:
      type: string
      enum: [PASS, WARN, FAIL]

    AgentType:
      type: string
      enum: [SECURITY, CODE_QUALITY, BUILD_HEALTH, COMPLETENESS, API_CONTRACT, TEST_COVERAGE, UI_UX, DOCUMENTATION, DATABASE, PERFORMANCE, DEPENDENCY, ARCHITECTURE]

    AgentStatus:
      type: string
      enum: [PENDING, RUNNING, COMPLETED, FAILED]

    AgentResult:
      type: string
      enum: [PASS, WARN, FAIL]

    Severity:
      type: string
      enum: [CRITICAL, HIGH, MEDIUM, LOW]

    FindingStatus:
      type: string
      enum: [OPEN, ACKNOWLEDGED, FALSE_POSITIVE, FIXED, WONT_FIX]

    Effort:
      type: string
      enum: [S, M, L, XL]

    DebtCategory:
      type: string
      enum: [ARCHITECTURE, CODE, TEST, DEPENDENCY, DOCUMENTATION]

    DebtStatus:
      type: string
      enum: [IDENTIFIED, PLANNED, IN_PROGRESS, RESOLVED]

    BusinessImpact:
      type: string
      enum: [LOW, MEDIUM, HIGH, CRITICAL]

    ComplianceStatus:
      type: string
      enum: [MET, PARTIAL, MISSING, NOT_APPLICABLE]

    SpecType:
      type: string
      enum: [OPENAPI, MARKDOWN, SCREENSHOT, FIGMA]

    TaskStatus:
      type: string
      enum: [PENDING, ASSIGNED, EXPORTED, JIRA_CREATED, COMPLETED]

    Priority:
      type: string
      enum: [P0, P1, P2, P3]

    VulnerabilityStatus:
      type: string
      enum: [OPEN, UPDATING, SUPPRESSED, RESOLVED]

    ScheduleType:
      type: string
      enum: [DAILY, WEEKLY, ON_COMMIT]

    Scope:
      type: string
      enum: [SYSTEM, TEAM, USER]

    DirectiveCategory:
      type: string
      enum: [ARCHITECTURE, STANDARDS, CONVENTIONS, CONTEXT, OTHER]

    DirectiveScope:
      type: string
      enum: [TEAM, PROJECT, USER]

    GitHubAuthType:
      type: string
      enum: [PAT, OAUTH, SSH]

    MfaMethod:
      type: string
      enum: [NONE, TOTP, EMAIL]

    # ──────────────────────────────────────────────
    # Request DTOs
    # ──────────────────────────────────────────────
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - displayName
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
        displayName:
          type: string
          minLength: 1
          maxLength: 100

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          minLength: 1

    ChangePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
          minLength: 1
        newPassword:
          type: string
          minLength: 8

    PasswordResetRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    MfaSetupRequest:
      type: object
      required:
        - password
      properties:
        password:
          type: string
          minLength: 1

    MfaVerifyRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          minLength: 1

    MfaLoginRequest:
      type: object
      required:
        - challengeToken
        - code
      properties:
        challengeToken:
          type: string
          minLength: 1
        code:
          type: string
          minLength: 1

    MfaEmailSetupRequest:
      type: object
      required:
        - password
      properties:
        password:
          type: string
          minLength: 1

    MfaResendRequest:
      type: object
      required:
        - challengeToken
      properties:
        challengeToken:
          type: string
          minLength: 1

    UpdateUserRequest:
      type: object
      properties:
        displayName:
          type: string
          maxLength: 100
        avatarUrl:
          type: string
          maxLength: 500

    CreateTeamRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 5000
        teamsWebhookUrl:
